name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build (Release)
        run: swift build -c release

      - name: Run Tests
        run: make test

  release:
    needs: build-and-test
    runs-on: macos-14
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Build DMG
        run: make dmg

      - name: Upload DMG
        uses: softprops/action-gh-release@v2
        with:
          files: .build/MacPulse.dmg
